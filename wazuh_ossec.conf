<!--
  This is a privacy-first Wazuh agent configuration for the Ghost Sentinel workstation.
  It is designed to monitor system integrity without inspecting user data.
-->

<ossec_config>
  <client>
    <server>
      <address>YOUR_WAZUH_MANAGER_IP</address>
      <port>1514</port>
      <protocol>udp</protocol>
    </server>
    <config-profile>whonix-workstation</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
  </client>

  <!-- File Integrity Monitoring -->
  <syscheck>
    <disabled>no</disabled>

    <!-- Directories to monitor for rootkits and system tampering -->
    <directories check_all="yes" realtime="yes">/etc,/usr/bin,/usr/sbin,/bin,/sbin</directories>

    <!--
      IGNORE the VeraCrypt mount point.
      This is critical for protecting journalist privacy.
      Wazuh will not read, checksum, or report on any files in this directory.
    -->
    <ignore type="sregex">^/mnt/vault/.*</ignore>
    <ignore type="sregex">^/home/user/intake/.*</ignore>

    <!-- Frequency that syscheck is run (in seconds) -->
    <frequency>3600</frequency>

    <scan_on_start>yes</scan_on_start>
  </syscheck>

  <!-- Log Analysis -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

</ossec_config>
